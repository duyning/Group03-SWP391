# Main Spring Boot configuration for Group03-SWP391.
spring:
  application:
    name: Group03_SWP391_Summer26
  config:
    import: optional:classpath:application-payos-local.yaml
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=Group3_SWP391;encrypt=false;trustServerCertificate=true}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sa}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: HikariPool-Group03

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
    encoding: UTF-8

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
    encoding:
      charset: UTF-8
      force: true
      enabled: true


mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

server:
  port: 8081
  servlet:
    context-path: /

app:
  seed:
    public-content: ${PUBLIC_CONTENT_SEED_ENABLED:false}
  upload:
    video-dir: uploads/videos/
    image-dir: uploads/images/

payment:
  payos:
    enabled: ${PAYOS_ENABLED:false}
    endpoint: ${PAYOS_ENDPOINT:https://api-merchant.payos.vn/v2/payment-requests}
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}
    return-url: ${PAYOS_RETURN_URL:http://localhost:8080/payment/payos/return}
    cancel-url: ${PAYOS_CANCEL_URL:http://localhost:8080/payment/payos/cancel}
