# Main Spring Boot configuration for Group03-SWP391.
spring:
  application:
    name: Group03_SWP391_Summer26

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=sample;encrypt=false;trustServerCertificate=true
    username: sa
    password: sa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: HikariPool-Group03

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
    encoding: UTF-8

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 1024MB

