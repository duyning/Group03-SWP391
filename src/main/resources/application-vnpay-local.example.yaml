# Copy this file to application-vnpay-local.yaml for local real payOS testing.
# Never commit application-vnpay-local.yaml because it contains real secrets.
payment:
  payos:
    enabled: true
    endpoint: https://api-merchant.payos.vn/v2/payment-requests
    client-id: YOUR_PAYOS_CLIENT_ID
    api-key: YOUR_PAYOS_API_KEY
    checksum-key: YOUR_PAYOS_CHECKSUM_KEY
    return-url: http://localhost:8083/payment/payos/return
    cancel-url: http://localhost:8083/payment/payos/cancel
