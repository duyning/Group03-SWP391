<!--
  Trang xác thực mã OTP khi đăng ký (Register OTP Verification).
  Bước 2 trong quy trình đăng ký: nhập mã OTP 6 số được gửi qua email.

  Ngày thực hiện: 08/06/2026
  Tạo bởi: AI Assistant
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực Email | Beta Cinemas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <style>
        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
            margin-bottom: 1rem;
        }
        .back-link:hover {
            color: #a78bfa;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .step-dot.active {
            background: #a78bfa;
            box-shadow: 0 0 8px rgba(167,139,250,0.6);
        }
        .step-dot.completed {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34,197,94,0.5);
        }
        .otp-email-hint {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .otp-email-hint strong {
            color: #a78bfa;
            font-weight: 600;
        }
        .resend-section {
            text-align: center;
            margin-top: 1.25rem;
        }
        .resend-section p {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .resend-link {
            color: #a78bfa;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
        }
        .resend-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #a78bfa, #ec4899);
            transition: width 0.3s ease;
            border-radius: 1px;
        }
        .resend-link:hover {
            color: #c4b5fd;
        }
        .resend-link:hover::after {
            width: 100%;
        }
        .otp-input {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.8rem;
            padding-left: 46px !important;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <!-- Decorative background elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="register-card">

        <a th:href="@{/register}" class="back-link"><i class="fas fa-arrow-left me-1"></i> Quay lại đăng ký</a>

        <!-- Header -->
        <div class="register-header">
            <div class="logo-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1>Xác thực Email</h1>
            <p>Nhập mã OTP gồm 6 chữ số đã được gửi đến email của bạn</p>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-dot completed"></div>
            <div class="step-dot active"></div>
        </div>

        <!-- Email hint -->
        <div class="otp-email-hint">
            Mã đã được gửi đến: <strong th:text="${email}"></strong>
        </div>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show animate-slide-in" role="alert"
             style="background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: #86efac; border-radius: 14px; font-size: 0.9rem; backdrop-filter: blur(10px);">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1); opacity: 0.5;"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show animate-slide-in" role="alert"
             style="background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; border-radius: 14px; font-size: 0.9rem; backdrop-filter: blur(10px);">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1); opacity: 0.5;"></button>
        </div>

        <!-- OTP Form -->
        <form th:action="@{/register/otp}" method="POST" class="register-form" novalidate>
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-hashtag input-icon"></i>
                    <input type="text" name="otp" class="form-input otp-input"
                           placeholder="● ● ● ● ● ●"
                           id="otp" required maxlength="6" pattern="\d{6}"
                           autocomplete="one-time-code" inputmode="numeric">
                </div>
            </div>

            <button type="submit" class="btn-register" style="margin-top: 1.5rem;" id="btnVerifyOtp">
                <span class="btn-text">Xác nhận đăng ký</span>
                <span class="btn-loader" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
                <i class="fas fa-check btn-arrow"></i>
            </button>
        </form>

        <!-- Resend OTP -->
        <div class="resend-section">
            <p>Không nhận được mã?</p>
            <a th:href="@{/register/resend-otp}" class="resend-link">
                <i class="fas fa-redo me-1"></i> Gửi lại mã OTP
            </a>
        </div>

        <!-- Footer -->
        <div class="register-footer">
            <p>Đã có tài khoản? <a th:href="@{/login}" class="login-link">Đăng nhập ngay</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Chỉ cho phép nhập số vào ô OTP
    document.getElementById('otp').addEventListener('input', function (e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Input focus animation
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('focus', function () {
            this.closest('.input-icon-wrapper').classList.add('focused');
        });
        input.addEventListener('blur', function () {
            this.closest('.input-icon-wrapper').classList.remove('focused');
        });
    });

    // Form submit animation
    document.querySelector('.register-form').addEventListener('submit', function () {
        const btn = document.getElementById('btnVerifyOtp');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.btn-arrow').style.display = 'none';
        btn.querySelector('.btn-loader').style.display = 'inline-block';
    });
</script>

</body>
</html>
