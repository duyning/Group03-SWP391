<!DOCTYPE html>
<!--
    Created on 2026-06-09: Admin dashboard for manager/admin after login.
    Created by: NinhDD - HE186113
-->
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CineFlow | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --primary: #0054a6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f1f5f9;
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: var(--bg-body);
            display: flex;
            color: #1e293b;
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            height: 100vh;
            color: #f8fafc;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px;
            font-size: 20px;
            font-weight: 800;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-nav {
            list-style: none;
            padding: 15px 0;
            margin: 0;
        }

        .sidebar-nav a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .sidebar-nav li {
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            transition: 0.2s;
        }

        .sidebar-nav li:hover,
        .sidebar-nav li.active {
            background: var(--sidebar-hover);
            color: white;
        }

        .sidebar-nav li.active {
            border-left: 4px solid var(--primary);
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
            min-height: 100vh;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }

        .breadcrumb {
            color: #64748b;
            margin: 5px 0 0 0;
            font-size: 14px;
        }

        .user-chip {
            background: white;
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: var(--card-shadow);
            font-weight: 700;
            color: #334155;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid var(--primary);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #eff6ff;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .stat-info h3 {
            margin: 0;
            font-size: 28px;
            color: #1e293b;
            font-weight: 800;
        }

        .stat-info p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 18px;
            font-weight: 800;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 15px;
            padding: 25px;
        }

        .quick-link {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            color: #1e293b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            transition: 0.2s;
        }

        .quick-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f8fafc;
            transform: translateY(-1px);
        }

        .quick-link i {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: #eff6ff;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/admin_sidebar :: adminSidebar('dashboard')}"></div>

    <main class="main">
        <div class="header-content">
            <div>
                <h1 class="page-title">Dashboard</h1>
                <p class="breadcrumb">Tổng quan hệ thống quản trị Beta Cinemas</p>
            </div>
            <div class="user-chip" th:if="${user != null}">
                <i class="fas fa-user-shield"></i>
                <span th:text="${user.name}">Manager</span>
            </div>
        </div>

        <!-- Hiển thị thông báo thành công (nếu có từ redirect flash attribute) -->
        <div th:if="${successMessage}" class="alert alert-success"
            style="padding:15px; background-color:#10b981; color:white; border-radius:8px; margin-bottom:20px;">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>
        
        <!-- Hiển thị thông báo lỗi (nếu có từ redirect flash attribute) -->
        <div th:if="${errorMessage}" class="alert alert-danger"
            style="padding:15px; background-color:#ef4444; color:white; border-radius:8px; margin-bottom:20px;">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-film"></i></div>
                <div class="stat-info">
                    <h3 th:text="${movieCount}">0</h3>
                    <p>Phim</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-theater-masks"></i></div>
                <div class="stat-info">
                    <h3 th:text="${roomCount}">0</h3>
                    <p>Phòng chiếu</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chair"></i></div>
                <div class="stat-info">
                    <h3 th:text="${seatCount}">0</h3>
                    <p>Ghế</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="stat-info">
                    <h3 th:text="${showtimeCount}">0</h3>
                    <p>Lịch chiếu</p>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">Truy cập nhanh</div>
            <div class="quick-grid">
                <a class="quick-link" href="/manage_movies.html"><i class="fas fa-film"></i> Quản lý phim</a>
                <a class="quick-link" href="/manage_showtime.html"><i class="fas fa-calendar-alt"></i> Quản lý lịch
                    chiếu</a>
                <a class="quick-link" th:href="@{/admin/rooms}"><i class="fas fa-theater-masks"></i> Rạp &amp; Phòng</a>
                <a class="quick-link" th:href="@{/admin/banners}"><i class="fas fa-images"></i> Quản lý banner</a>
                <a class="quick-link" th:href="@{/admin/catalogs}"><i class="fas fa-list"></i> Danh mục phòng</a>
                <a class="quick-link" th:href="@{/admin/combos}"><i class="fas fa-utensils"></i> Quản lý Combo</a>
                <a class="quick-link" th:href="@{/admin/posts}"><i class="fas fa-newspaper"></i> Quản lý tin tức</a>
                <a class="quick-link" th:href="@{/admin/create-manager}"><i class="fas fa-user-shield"></i> Tạo tài
                    khoản Quản lý</a>
            </div>
        </section>
    </main>
</body>

</html>
