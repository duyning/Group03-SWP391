<!doctype html>
<!--
  Cổng thanh toán mô phỏng cho môi trường local/demo. Ba nút gửi cùng endpoint nhưng
  khác giá trị result để kiểm thử đầy đủ SUCCESS, FAILED và CANCELLED mà không cần merchant key.
-->
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cổng thanh toán thử nghiệm | CineFlow</title>
    <link rel="stylesheet" th:href="@{/css/booking-flow.css}">
    <style>.gateway-wide{width:min(760px,calc(100% - 28px))}</style>
</head>
<body>
<header th:replace="~{fragments/common_header :: flowHeaderTimer('Hạn thanh toán:', ${details.booking.expiresAt}, @{/payment/result(orderCode=${payment.orderCode})})}"></header>
<main class="gateway gateway-wide">
    <div class="gateway-logo" th:text="${payment.paymentMethod}">VNPAY</div>
    <h1>Cổng thanh toán thử nghiệm</h1>
    <p>Môi trường local chưa cấu hình merchant key. Chọn kết quả bên dưới để kiểm thử callback đầy đủ.</p>
    <dl>
        <dt>Mã đơn</dt><dd th:text="${'#CF' + details.booking.id}">#CF1</dd>
        <dt>Mã giao dịch</dt><dd th:text="${payment.orderCode}">CF...</dd>
        <dt>Phim</dt><dd th:text="${details.showtime.movie.title}">Tên phim</dd>
        <dt>Suất chiếu</dt><dd th:text="${#temporals.format(details.showtime.showDate,'dd/MM/yyyy')} + ' • ' + ${#temporals.format(details.showtime.showTime,'HH:mm')}">26/06/2026 • 19:00</dd>
        <dt>Ghế</dt><dd th:text="${#strings.listJoin(details.tickets.![seatLabel], ', ')}">A1</dd>
        <dt>Số tiền</dt><dd th:text="${#numbers.formatDecimal(payment.amount,0,'COMMA',0,'POINT')} + 'đ'">0đ</dd>
    </dl>
    <!-- Backend vẫn kiểm tra hạn booking trước khi chấp nhận kết quả SUCCESS. -->
    <form method="post" th:action="@{/payment/gateway/{code}/complete(code=${payment.orderCode})}" class="gateway-actions">
        <button class="btn success-bg" name="result" value="SUCCESS">Thanh toán thành công</button>
        <button class="btn danger-bg" name="result" value="FAILED">Mô phỏng thất bại</button>
        <button class="btn secondary" name="result" value="CANCELLED">Hủy giao dịch</button>
    </form>
</main>
<script th:src="@{/js/booking-timer.js}"></script>
</body>
</html>
