<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="customerHeader(active, keyword)">
    <div class="top-bar">
        <div class="top-container">
            <div class="top-actions top-actions-guest" th:if="${user == null}">
                <a th:href="@{/login}" class="top-link top-link-button">Đăng nhập</a>
                <a th:href="@{/register}" class="top-link top-link-button top-link-outline">Đăng ký</a>
            </div>
            <div class="top-actions top-actions-member" th:if="${user != null}">
                <a th:href="@{/vouchers/my-wallet}" class="top-link top-quick-link">Ví voucher</a>
                <a th:href="@{/notifications}" class="top-link notification-container" aria-label="Thông báo" title="Thông báo">
                    <span class="notification-bell" aria-hidden="true"></span>
                    <span class="badge"
                          th:if="${unreadNotificationCount != null && unreadNotificationCount > 0}"
                          th:text="${unreadNotificationCount > 99 ? '99+' : unreadNotificationCount}">3</span>
                </a>
                <details class="account-menu">
                    <summary>
                        <span class="account-prefix">Tài khoản</span>
                        <span class="account-name" th:text="${user.name != null && !#strings.isEmpty(user.name) ? user.name : 'Thành viên'}">Thành viên</span>
                        <span class="account-caret"></span>
                    </summary>
                    <div class="account-dropdown">
                        <a th:href="@{/profile}">Hồ sơ của tôi</a>
                        <a th:href="@{/wishlist}">Danh sách yêu thích</a>
                        <a th:href="@{/logout}" class="danger-link">Đăng xuất</a>
                    </div>
                </details>
            </div>
            <img src="https://flagcdn.com/w40/gb.png" class="lang-icon" alt="Tiếng Anh">
        </div>
    </div>

    <header class="header-main">
        <div class="header-container">
            <a th:href="@{/}">
                <img src="/images/cineflow-logo.svg" alt="CineFlow Cinema" class="logo">
            </a>
            <nav class="nav-menu">
                <a th:href="@{/}" th:classappend="${active == 'home'} ? 'active'">TRANG CHỦ</a>
                <a th:href="@{/movies}" th:classappend="${active == 'movies'} ? 'active'">PHIM</a>
                <a th:href="@{/about}" th:classappend="${active == 'cinema'} ? 'active'">RẠP</a>
                <a href="#" th:classappend="${active == 'price'} ? 'active'">GIÁ VÉ</a>
                <a th:href="@{/promotions}" th:classappend="${active == 'promotions'} ? 'active'">ƯU ĐÃI</a>
                <a th:href="@{/vouchers}" th:classappend="${active == 'voucher'} ? 'active'">KHO VOUCHER</a>
                <a th:href="@{/posts}" th:classappend="${active == 'posts'} ? 'active'">TIN TỨC</a>
                <a th:href="@{/contact}" th:classappend="${active == 'contact'} ? 'active'">LIÊN HỆ</a>
            </nav>
            <form class="search-form" th:action="@{/search}" method="get">
                <input type="search" name="keyword" placeholder="Tìm phim" th:value="${keyword}">
                <button type="submit">Tìm</button>
            </form>
        </div>
    </header>
</th:block>

<header class="flow-header" th:fragment="flowHeader(text)">
    <a th:href="@{/}"><img src="/images/cineflow-logo.svg" alt="CineFlow"></a>
    <div th:text="${text}">CineFlow</div>
</header>

<header class="flow-header" th:fragment="flowHeaderTimer(label, expiry, timeoutUrl)">
    <a th:href="@{/}"><img src="/images/cineflow-logo.svg" alt="CineFlow"></a>
    <div>
        <span th:text="${label}">Còn lại:</span>
        <b class="timer" th:attr="data-expiry=${expiry},data-timeout-url=${timeoutUrl}">05:00</b>
    </div>
</header>
</body>
</html>
