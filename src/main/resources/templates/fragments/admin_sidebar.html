<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>

        <img src="/images/cineflow-logo-light.svg" height="35" alt="CineFlow Cinema">
        <span>ADMIN</span>
    </div>
    <ul class="sidebar-nav">
        <a th:href="@{/admin/dashboard}"><li th:classappend="${active == 'dashboard'} ? 'active' : ''"><i class="fas fa-chart-line"></i> Dashboard</li></a>
        <a href="/manage_movies.html"><li th:classappend="${active == 'movies'} ? 'active' : ''"><i class="fas fa-film"></i> Quản lý phim</li></a>
