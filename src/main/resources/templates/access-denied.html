<!--
  Trang Từ chối truy cập (Access Denied).
  Hiển thị khi người dùng truy cập trang không có quyền.
  
  Ngày thực hiện: 04/06/2026
  Tạo bởi: DuongND_HE186619
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không có quyền truy cập - CinemaBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .denied-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .denied-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2.2rem;
            color: #f87171;
        }

        .denied-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f87171;
        }

        .denied-card p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: white;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.35);
            color: white;
        }
    </style>
</head>
<body>

<div class="denied-card">
    <div class="denied-icon">
        <i class="fas fa-lock"></i>
    </div>
    <h1>Không có quyền truy cập</h1>
    <p>Bạn không có quyền truy cập vào trang này.<br>Vui lòng liên hệ quản trị viên nếu bạn cho rằng đây là lỗi.</p>
    <a th:href="@{/home}" class="btn-back">
        <i class="fas fa-arrow-left"></i> Quay lại trang chủ
    </a>
</div>

</body>
</html>
