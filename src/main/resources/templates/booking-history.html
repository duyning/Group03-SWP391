<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử giao dịch - CinemaBook</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ticket-blue: #0054a6;
            --ticket-cyan: #16a6df;
            --ticket-bg: #f4f8fd;
            --ticket-text: #172033;
            --ticket-muted: #667085;
            --ticket-border: #d9e6f5;
            --ticket-card: #ffffff;
        }

        body {
            background:
                radial-gradient(circle at top right, rgba(22,166,223,0.12), transparent 30%),
                linear-gradient(135deg, #ffffff 0%, var(--ticket-bg) 48%, #eaf3ff 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--ticket-text);
            padding: 40px 20px;
        }

        .page-container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--ticket-blue), var(--ticket-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--ticket-card);
            border: 1px solid var(--ticket-border);
            border-radius: 12px;
            color: var(--ticket-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(0,84,166,0.06);
        }

        .btn-back:hover {
            background: var(--ticket-blue);
            border-color: var(--ticket-blue);
            color: white;
            transform: translateY(-2px);
        }

        /* History Cards */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .history-card {
            background: var(--ticket-card);
            border-radius: 20px;
            border: 1px solid var(--ticket-border);
            padding: 24px;
            box-shadow: 0 12px 32px rgba(15,35,75,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .history-card:hover {
            box-shadow: 0 16px 40px rgba(0,84,166,0.12);
            border-color: rgba(0,84,166,0.2);
            transform: translateY(-2px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed var(--ticket-border);
        }

        .booking-code-label {
            font-size: 0.8rem;
            color: var(--ticket-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .booking-code {
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            color: var(--ticket-blue);
            letter-spacing: 1px;
        }

        .transaction-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-success {
            background: rgba(34,197,94,0.15);
            color: #16a34a;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .status-failed {
            background: rgba(239,68,68,0.15);
            color: #dc2626;
            border: 1px solid rgba(239,68,68,0.3);
        }
        
        .status-cancelled {
            background: rgba(148,163,184,0.15);
            color: #64748b;
            border: 1px solid rgba(148,163,184,0.3);
        }

        .status-pending {
            background: rgba(245,158,11,0.15);
            color: #d97706;
            border: 1px solid rgba(245,158,11,0.3);
        }

        .history-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 576px) {
            .history-body {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 0.82rem;
            color: var(--ticket-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-label i {
            color: var(--ticket-cyan);
            width: 14px;
            text-align: center;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ticket-text);
        }

        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #dc2626; /* Màu đỏ nổi bật cho hóa đơn */
        }

        .history-footer {
            background: var(--ticket-bg);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--ticket-text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-footer i {
            color: var(--ticket-blue);
            font-size: 1.2rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255,255,255,0.86);
            border: 1px dashed #b8cbe3;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(15,35,75,0.06);
        }

        .empty-state i {
            font-size: 3.5rem;
            color: rgba(0,84,166,0.18);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--ticket-text);
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <!-- Header -->
    <div class="page-header">
        <div class="page-title"><i class="fas fa-file-invoice-dollar"></i> Lịch sử giao dịch</div>
        <a th:href="@{/my-tickets}" class="btn-back">
            <i class="fas fa-ticket-alt"></i> Vé của tôi
        </a>
    </div>

    <!-- History List -->
    <div class="history-list" th:if="${!history.isEmpty()}">
        
        <div class="history-card" th:each="item : ${history}">
            <div class="history-header">
                <div>
                    <div class="booking-code-label">Mã giao dịch</div>
                    <div class="booking-code" th:text="${item.bookingCode}">CF-123456789</div>
                </div>
                <div class="transaction-status" th:classappend="${item.statusClass}">
                    <i th:class="${item.statusClass == 'status-success'} ? 'fas fa-check-circle' : (${item.statusClass == 'status-failed' || item.statusClass == 'status-cancelled'} ? 'fas fa-times-circle' : 'fas fa-clock')"></i>
                    <span th:text="${item.status}">Thành công</span>
                </div>
            </div>

            <div class="history-body">
                <div class="info-group">
                    <div class="info-label"><i class="fas fa-calendar-alt"></i> Thời gian giao dịch</div>
                    <div class="info-value" th:text="${#temporals.format(item.bookingTime, 'dd/MM/yyyy - HH:mm')}">25/06/2026 - 14:30</div>
                </div>
                
                <div class="info-group">
                    <div class="info-label"><i class="fas fa-wallet"></i> Phương thức thanh toán</div>
                    <div class="info-value" th:text="${item.paymentMethod}">VNPAY</div>
                </div>

                <div class="info-group" style="grid-column: 1 / -1;">
                    <div class="info-label"><i class="fas fa-money-bill-wave"></i> Tổng thanh toán</div>
                    <div class="total-amount" th:text="${#numbers.formatDecimal(item.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">150,000 ₫</div>
                </div>
            </div>

            <div class="history-footer">
                <i class="fas fa-info-circle"></i>
                <span th:text="${item.summary}">Thanh toán 2 vé xem phim "Lật Mặt 7" (Ghế K9, K10)</span>
            </div>
        </div>
        
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${history.isEmpty()}">
        <i class="fas fa-file-invoice-dollar"></i>
        <h3>Chưa có giao dịch nào</h3>
        <p style="font-size: 0.85rem; color: #667085;">Bạn chưa thực hiện bất kỳ thanh toán nào trên hệ thống.</p>
    </div>
</div>

</body>
</html>
