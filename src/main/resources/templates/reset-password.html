<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu | CineFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/reset-password.css}">
    <link rel="stylesheet" th:href="@{/css/customer-account.css}">
    <link rel="stylesheet" th:href="@{/css/common-header.css}">
</head>
<body class="customer-header-page">

<div th:replace="~{fragments/common_header :: customerHeader('', '')}"></div>

<div class="page-wrapper">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="card-container">
        <div class="card-header-section">
            <div class="icon-box">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Đổi mật khẩu</h1>
            <p>Cập nhật mật khẩu để bảo vệ tài khoản của bạn</p>
        </div>

        <div th:if="${successMessage}" class="alert-box alert-success-box" data-auto-dismiss="5000">
            <div class="alert-icon"><i class="fas fa-check-circle"></i></div>
            <div class="alert-content">
                <strong>Thành công!</strong>
                <span th:text="${successMessage}"></span>
            </div>
            <button class="alert-close" onclick="this.closest('.alert-box').style.display='none'">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div th:if="${formError}" class="alert-box alert-error-box" data-auto-dismiss="5000">
            <div class="alert-icon"><i class="fas fa-exclamation-circle"></i></div>
            <div class="alert-content">
                <strong>Lỗi!</strong>
                <span th:text="${formError}"></span>
            </div>
            <button class="alert-close" onclick="this.closest('.alert-box').style.display='none'">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form th:action="@{/reset-password}" method="POST" class="reset-form" id="resetForm" novalidate>
            <div class="field-group">
                <label for="oldPassword" class="field-label">
                    <i class="fas fa-lock"></i> Mật khẩu cũ <span class="required-dot">*</span>
                </label>
                <div class="input-wrap">
                    <input type="password"
                           id="oldPassword"
                           name="oldPassword"
                           class="field-input"
                           placeholder="Nhập mật khẩu hiện tại"
                           autocomplete="current-password"
                           th:value="${oldPassword}">
                    <button type="button" class="eye-btn" onclick="toggleField('oldPassword', 'eyeOld')">
                        <i class="fas fa-eye" id="eyeOld"></i>
                    </button>
                </div>
                <span class="field-error server-error" id="errOld" th:if="${oldPasswordError}" th:text="${oldPasswordError}"></span>
            </div>

            <div class="section-divider">
                <span>Mật khẩu mới</span>
            </div>

            <div class="field-group">
                <label for="newPassword" class="field-label">
                    <i class="fas fa-key"></i> Mật khẩu mới <span class="required-dot">*</span>
                </label>
                <div class="input-wrap">
                    <input type="password"
                           id="newPassword"
                           name="newPassword"
                           class="field-input"
                           placeholder="8-20 ký tự"
                           autocomplete="new-password"
                           th:value="${newPassword}">
                    <button type="button" class="eye-btn" onclick="toggleField('newPassword', 'eyeNew')">
                        <i class="fas fa-eye" id="eyeNew"></i>
                    </button>
                </div>
                <span class="field-error" id="errNew"></span>
            </div>

            <div class="field-group">
                <label for="confirmPassword" class="field-label">
                    <i class="fas fa-check-double"></i> Xác nhận mật khẩu <span class="required-dot">*</span>
                </label>
                <div class="input-wrap">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           class="field-input"
                           placeholder="Nhập lại mật khẩu mới"
                           autocomplete="new-password"
                           th:value="${confirmPassword}">
                    <button type="button" class="eye-btn" onclick="toggleField('confirmPassword', 'eyeConfirm')">
                        <i class="fas fa-eye" id="eyeConfirm"></i>
                    </button>
                </div>
                <span class="field-error" id="errConfirm"></span>
            </div>

            <div th:if="${formError}" class="mb-3">
                <span class="field-error" style="display:block;" th:text="${formError}"></span>
            </div>

            <div class="rules-box">
                <p class="rules-title"><i class="fas fa-info-circle"></i> Yêu cầu mật khẩu</p>
                <ul>
                    <li>Từ 8 đến 20 ký tự</li>
                    <li>Mật khẩu xác nhận phải khớp</li>
                    <li>Phải khác mật khẩu cũ</li>
                </ul>
            </div>

            <div class="action-row">
                <a th:href="@{/home}" class="btn-cancel">
                    <i class="fas fa-arrow-left"></i> Hủy
                </a>
                <button type="submit" class="btn-submit" id="btnSubmit">
                    <span class="btn-text"><i class="fas fa-save"></i> Lưu thay đổi</span>
                    <span class="btn-loading" style="display:none"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auto-dismiss-alerts.js}"></script>
<script>
    function toggleField(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    document.getElementById('resetForm').addEventListener('submit', function (e) {
        const old = document.getElementById('oldPassword').value.trim();
        const np = document.getElementById('newPassword').value.trim();
        const cp = document.getElementById('confirmPassword').value.trim();
        let valid = true;

        clearErrors();

        if (!old) { showError('errOld', 'Mật khẩu cũ không được để trống'); valid = false; }
        if (!np) { showError('errNew', 'Mật khẩu mới không được để trống'); valid = false; }
        else if (np.length < 8 || np.length > 20) { showError('errNew', 'Mật khẩu mới phải từ 8 đến 20 ký tự'); valid = false; }
        else if (old && np === old) { showError('errNew', 'Mật khẩu mới phải khác mật khẩu cũ'); valid = false; }
        if (!cp) { showError('errConfirm', 'Xác nhận mật khẩu không được để trống'); valid = false; }
        else if (np && cp !== np) { showError('errConfirm', 'Mật khẩu xác nhận không khớp'); valid = false; }

        if (!valid) {
            e.preventDefault();
            return;
        }

        document.querySelector('.btn-text').style.display = 'none';
        document.querySelector('.btn-loading').style.display = 'inline-block';
    });

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = 'block';
    }

    function clearErrors() {
        ['errOld', 'errNew', 'errConfirm'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = '';
                el.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
