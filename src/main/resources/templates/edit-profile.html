<!--
  Trang Chỉnh sửa hồ sơ cá nhân (Edit Profile Page).
  Giao diện cho phép người dùng chỉnh sửa: Họ tên, Ngày sinh, Giới tính, Địa chỉ.
  Sử dụng styling và cấu trúc từ register.html.

  Ngày thực hiện: 25/06/2026
  Tạo bởi: DuongND_HE186619
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa hồ sơ | CineFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/customer-account.css}">
    <style>
        .ui-datepicker {
            z-index: 9999 !important;
            background: #2a2a4a !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px !important;
            padding: 10px !important;
            color: #fff !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .ui-datepicker .ui-datepicker-header {
            background: transparent !important;
            border: none !important;
            color: #fff !important;
        }
        .ui-datepicker .ui-datepicker-title select {
            background: #1e1e38;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            padding: 2px 5px;
            margin: 0 2px;
        }
        .ui-datepicker th { color: #a78bfa !important; }
        .ui-datepicker td span, .ui-datepicker td a {
            background: transparent !important;
            border: 1px solid transparent !important;
            color: #e0e0e0 !important;
            text-align: center !important;
            border-radius: 6px !important;
        }
        .ui-datepicker td a:hover {
            background: rgba(167, 139, 250, 0.2) !important;
            border: 1px solid #a78bfa !important;
        }
        .ui-datepicker-current-day a {
            background: linear-gradient(135deg, #a78bfa, #ec4899) !important;
            color: #fff !important;
            font-weight: bold !important;
        }

        /* Adjust textarea icon alignment */
        .textarea-wrapper .input-icon {
            top: 18px;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <!-- Decorative background elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="register-card">
        <!-- Header -->
        <div class="register-header">
            <div class="logo-icon">
                <i class="fas fa-user-edit"></i>
            </div>
            <h1>Chỉnh sửa hồ sơ</h1>
            <p>Cập nhật thông tin cá nhân của bạn</p>
        </div>

        <!-- Success message -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show animate-slide-in" role="alert" data-auto-dismiss="5000">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}">Cập nhật thành công!</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Edit Form -->
        <form th:action="@{/profile/edit}" method="POST" class="register-form" novalidate>

            <!-- Name -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper" th:classappend="${nameError != null} ? 'is-invalid' : ''">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="name"
                           class="form-input"
                           th:value="${account.name}"
                           placeholder="Họ và tên"
                           id="name" required>
                    <label for="name">Họ và tên <span class="required">*</span></label>
                </div>
                <div th:if="${nameError != null}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${nameError}"></span>
                </div>
            </div>

            <div class="form-row">
                <!-- Ngày sinh -->
                <div class="form-floating-group">
                    <div class="input-icon-wrapper" th:classappend="${dobError != null} ? 'is-invalid' : ''">
                        <i class="fas fa-calendar input-icon"></i>
                        <input type="hidden" name="dob" th:value="${account.dob != null ? account.dob.toString() : ''}" id="dobHidden">
                        <input type="text"
                               class="form-input"
                               placeholder="dd/MM/yyyy"
                               id="dobDisplay" required>
                        <label for="dobDisplay">Ngày sinh <span class="required">*</span></label>
                    </div>
                    <div th:if="${dobError != null}" class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:text="${dobError}"></span>
                    </div>
                </div>

                <!-- Giới tính -->
                <div class="form-floating-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-venus-mars input-icon"></i>
                        <select name="gender" class="form-input select-input" id="gender">
                            <option value="" disabled>Chọn giới tính</option>
                            <option value="Nam" th:selected="${account.gender == 'Nam'}">Nam</option>
                            <option value="Nữ" th:selected="${account.gender == 'Nữ'}">Nữ</option>
                            <option value="Khác" th:selected="${account.gender == 'Khác'}">Khác</option>
                        </select>
                        <label for="gender">Giới tính</label>
                    </div>
                </div>
            </div>

            <!-- Phone Number -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper" th:classappend="${phoneError != null} ? 'is-invalid' : ''">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="text" name="phoneNum"
                           class="form-input"
                           th:value="${account.phoneNum}"
                           placeholder="Số điện thoại"
                           id="phoneNum">
                    <label for="phoneNum">Số điện thoại</label>
                </div>
                <div th:if="${phoneError != null}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${phoneError}"></span>
                </div>
            </div>

            <!-- Address -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper textarea-wrapper">
                    <i class="fas fa-map-marker-alt input-icon"></i>
                    <textarea name="address"
                              class="form-input textarea-input"
                              placeholder="Địa chỉ"
                              id="address" rows="2" th:text="${account.address}"></textarea>
                    <label for="address">Địa chỉ</label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-register" id="btnRegister">
                <span class="btn-text">Lưu thay đổi</span>
                <span class="btn-loader" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
                <i class="fas fa-save btn-arrow"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="register-footer">
            <a th:href="@{/profile}" class="login-link"><i class="fas fa-arrow-left"></i> Quay lại hồ sơ</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auto-dismiss-alerts.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        $.datepicker.regional['vi'] = {
            closeText: 'Đóng',
            prevText: 'Trước',
            nextText: 'Tiếp',
            currentText: 'Hôm nay',
            monthNames: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
            'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'],
            monthNamesShort: ['Thg 1', 'Thg 2', 'Thg 3', 'Thg 4', 'Thg 5', 'Thg 6',
            'Thg 7', 'Thg 8', 'Thg 9', 'Thg 10', 'Thg 11', 'Thg 12'],
            dayNames: ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'],
            dayNamesShort: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            dayNamesMin: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            weekHeader: 'Tu',
            dateFormat: 'dd/mm/yy',
            firstDay: 1,
            isRTL: false,
            showMonthAfterYear: false,
            yearSuffix: ''};
        $.datepicker.setDefaults($.datepicker.regional['vi']);

        $("#dobDisplay").datepicker({
            changeMonth: true,
            changeYear: true,
            yearRange: "-100:-13",
            defaultDate: "-20y",
            altField: "#dobHidden",
            altFormat: "yy-mm-dd",
            maxDate: "-13y",
            minDate: "-100y"
        });

        // Form submit animation
        document.querySelector('.register-form').addEventListener('submit', function () {
            const btn = document.getElementById('btnRegister');
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-arrow').style.display = 'none';
            btn.querySelector('.btn-loader').style.display = 'inline-block';
        });

        // Input focus animation
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function () {
                this.closest('.input-icon-wrapper').classList.add('focused');
            });
            input.addEventListener('blur', function () {
                this.closest('.input-icon-wrapper').classList.remove('focused');
            });
            // Initial check for non-empty inputs to keep floating label up (if supported by css, though placeholder is used here)
        });

        // Initialize display date from hidden value
        const hiddenVal = $("#dobHidden").val();
        if (hiddenVal) {
            const parts = hiddenVal.split('-');
            if (parts.length === 3) {
                const formatted = parts[2] + '/' + parts[1] + '/' + parts[0];
                $("#dobDisplay").val(formatted);
            }
        }
    });
</script>

</body>
</html>
