<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background: #f4f7fb; color: #172033; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .notification-shell { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .surface { background: #ffffff; border: 1px solid #dbe5ef; border-radius: 12px; box-shadow: 0 4px 12px rgba(15, 55, 104, 0.04); overflow: hidden; }

        /* Header thông báo */
        .page-heading { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #edf2f7; }
        .page-heading h1 { color: #0f3768; font-size: 1.4rem; font-weight: 750; margin: 0; }
        .badge-count { background: #d91f3f; color: white; border-radius: 99px; padding: 4px 10px; font-size: 0.85rem; margin-left: 8px; }
        .btn-mark-read { color: #075ba8; font-weight: 600; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .btn-mark-read:hover { color: #0b63b6; text-decoration: underline; }

        /* Khối từng thông báo */
        .noti-item { display: flex; gap: 16px; padding: 20px 24px; border-bottom: 1px solid #edf2f7; text-decoration: none; color: inherit; transition: background 0.2s; }
        .noti-item:last-child { border-bottom: none; }
        .noti-item:hover { background: #f8fafc; }

        /* Trạng thái chưa đọc */
        .noti-unread { background: #f0f7ff; }
        .noti-unread .noti-title { font-weight: 750; color: #0f3768; }
        .noti-unread .noti-icon-box { background: #075ba8; color: white; }

        /* Trạng thái đã đọc */
        .noti-read .noti-title { font-weight: 600; color: #334155; }
        .noti-read .noti-text { color: #64748b; }
        .noti-read .noti-icon-box { background: #e2e8f0; color: #64748b; }

        /* Icon và nội dung */
        .noti-icon-box { width: 48px; height: 48px; min-width: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .noti-content { flex: 1; }
        .noti-title { font-size: 1.05rem; margin: 0 0 4px 0; }
        .noti-text { font-size: 0.95rem; margin: 0 0 8px 0; line-height: 1.5; }
        .noti-time { font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; gap: 6px; }

        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="notification-shell">
    <div class="surface">
        <div class="page-heading">
            <div>
                <h1>Thông báo <span th:if="${unreadCount > 0}" class="badge-count" th:text="${unreadCount} + ' mới'"></span></h1>
            </div>
            <a th:if="${unreadCount > 0}" th:href="@{/notifications/read-all}" class="btn-mark-read">
                <i class="fa-solid fa-check-double me-1"></i> Đánh dấu đã đọc tất cả
            </a>
        </div>

        <div class="noti-list">

            <div th:if="${notifications.content.isEmpty()}" class="empty-state">
                <i class="fa-regular fa-bell-slash"></i>
                <h5>Bạn chưa có thông báo nào</h5>
                <p>Khi có hoạt động mới, thông báo sẽ hiển thị tại đây.</p>
            </div>

            <a th:each="noti : ${notifications.content}"
               th:href="@{/notifications/read/{id}(id=${noti.id})}"
               th:classappend="${!noti.isRead} ? 'noti-item noti-unread' : 'noti-item noti-read'">

                <div class="noti-icon-box">
                    <i th:if="${noti.type.name() == 'BOOKING'}" class="fa-solid fa-ticket"></i>
                    <i th:if="${noti.type.name() == 'PAYMENT'}" class="fa-solid fa-credit-card"></i>
                    <i th:if="${noti.type.name() == 'PROMOTION'}" class="fa-solid fa-bullhorn"></i>
                    <i th:if="${noti.type.name() == 'VOUCHER'}" class="fa-solid fa-gift"></i>
                    <i th:if="${noti.type.name() == 'SYSTEM'}" class="fa-solid fa-gear"></i>
                </div>

                <div class="noti-content">
                    <h4 class="noti-title" th:text="${noti.title}">Tiêu đề thông báo</h4>
                    <p class="noti-text" th:text="${noti.content}">Nội dung chi tiết của thông báo nằm ở đây...</p>
                    <div class="noti-time">
                        <i class="fa-regular fa-clock"></i>
                        <span th:text="${#temporals.format(noti.createdAt, 'dd/MM/yyyy HH:mm')}">10/07/2026 09:00</span>
                    </div>
                </div>

                <div th:if="${!noti.isRead}" class="d-flex align-items-center">
                    <span style="width: 10px; height: 10px; background-color: #0b63b6; border-radius: 50%; display: block;"></span>
                </div>
            </a>
        </div>
    </div>

    <nav class="mt-4" th:if="${notifications.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${notifications.first} ? 'disabled'">
                <a class="page-link" th:href="@{/notifications(page=0)}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, notifications.totalPages - 1)}" th:classappend="${i == notifications.number} ? 'active'">
                <a class="page-link" th:href="@{/notifications(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${notifications.last} ? 'disabled'">
                <a class="page-link" th:href="@{/notifications(page=${notifications.totalPages - 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
