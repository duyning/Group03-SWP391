<!doctype html>
<!--
  Bước 1 của booking. schedule đã được service loại suất quá giờ/hết ghế và gom theo ngày.
  Mỗi giờ chiếu là một form POST riêng để server xác thực lại movieId, date và showtimeId
  trước khi tạo BookingSelection trong session.
-->
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch chiếu | CineFlow</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" th:href="@{/css/booking-flow.css}">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, Arial, sans-serif; background: #eef3f9; color: #172033; }
        .page { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 64px; }
        .page .steps { margin-bottom: 22px; }
        .booking-shell { display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 24px; align-items: start; }
        .movie-card, .schedule-card { background: #fff; border: 1px solid #e3eaf3; border-radius: 24px; box-shadow: 0 18px 44px rgba(23, 42, 69, .09); overflow: hidden; }
        .movie-card { position: sticky; top: 92px; }
        .poster-wrap { position: relative; background: #dfe8f4; }
        .movie-poster { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; display: block; }
        .movie-badge { position: absolute; left: 14px; bottom: 14px; padding: 7px 12px; border-radius: 999px; background: rgba(0, 84, 166, .92); color: #fff; font-size: 13px; font-weight: 800; }
        .movie-info { padding: 20px; }
        .movie-info h2 { margin: 0 0 12px; color: #10233d; font-size: 23px; line-height: 1.25; }
        .movie-meta { display: grid; gap: 9px; color: #5f6f84; font-size: 14px; }
        .movie-meta span { display: inline-flex; align-items: center; gap: 8px; }
        .schedule-head { padding: 24px 28px 18px; border-bottom: 1px solid #e6edf5; background: linear-gradient(135deg, #ffffff 0%, #f3f8ff 100%); }
        .title-row { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
        .eyebrow { margin: 0 0 8px; color: #0054a6; font-weight: 900; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; }
        .schedule-head h1 { margin: 0; color: #10233d; font-size: clamp(26px, 3vw, 38px); line-height: 1.12; }
        .cinema-name { margin: 10px 0 0; color: #516178; font-size: 16px; font-weight: 700; }
        .back-link { flex: 0 0 auto; width: 40px; height: 40px; display: grid; place-items: center; border-radius: 50%; color: #68768b; background: #fff; border: 1px solid #dfe7f1; text-decoration: none; font-size: 28px; line-height: 1; transition: .16s ease; }
        .back-link:hover { color: #0054a6; border-color: #b9cce5; transform: rotate(90deg); }
        .date-tabs { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(118px, 1fr); gap: 12px; padding: 20px 28px; overflow-x: auto; border-bottom: 1px solid #e6edf5; }
        .date-tab { appearance: none; border: 1px solid #dbe5f0; border-radius: 18px; background: #fff; padding: 14px 12px; color: #172033; cursor: pointer; text-align: left; min-height: 86px; transition: .16s ease; }
        .date-tab:hover { border-color: #9ebee5; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0, 84, 166, .1); }
        .date-tab.active { color: #fff; border-color: #0054a6; background: linear-gradient(135deg, #0054a6, #0575d8); box-shadow: 0 14px 28px rgba(0, 84, 166, .22); }
        .date-tab .day { display: block; font-size: 34px; line-height: .95; font-weight: 900; letter-spacing: -1px; }
        .date-tab .month-week { display: block; margin-top: 7px; font-size: 13px; font-weight: 800; opacity: .9; }
        .date-tab .hint { display: block; margin-top: 6px; font-size: 12px; font-weight: 700; opacity: .72; }
        .alert { margin: 22px 28px 0; padding: 13px 15px; border-radius: 12px; background: #fff0f0; color: #b42318; font-weight: 700; }
        .showtime-panel { display: none; padding: 26px 28px 30px; }
        .showtime-panel.active { display: block; }
        .format-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 18px; }
        .format-heading { margin: 0; color: #10233d; font-size: 21px; font-weight: 900; text-transform: uppercase; }
        .format-note { color: #68768b; font-size: 13px; font-weight: 700; }
        .time-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
        .time-grid form { margin: 0; }
        .time-card { width: 100%; min-height: 96px; border: 1px solid #dbe5f0; border-radius: 18px; background: #fff; padding: 14px 14px 12px; cursor: pointer; font: inherit; color: #172033; text-align: left; transition: .16s ease; box-shadow: 0 8px 20px rgba(23, 42, 69, .05); }
        .time-card:hover { border-color: #0054a6; transform: translateY(-2px); box-shadow: 0 16px 28px rgba(0, 84, 166, .16); }
        .time-main { display: block; color: #0054a6; font-size: 26px; font-weight: 900; line-height: 1; }
        .time-room { display: block; margin-top: 9px; color: #526277; font-size: 13px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 12px; color: #172033; font-size: 12px; font-weight: 800; }
        .seat-pill { padding: 5px 8px; border-radius: 999px; background: #eef6ff; color: #0054a6; }
        .late-pill { padding: 5px 8px; border-radius: 999px; background: #fff4d8; color: #9a6100; }
        .time-card.late { background: linear-gradient(180deg, #fff 0%, #fff8e8 100%); }
        .empty { margin: 28px; padding: 46px 20px; text-align: center; background: #f8fafc; border: 1px dashed #c7d2df; border-radius: 18px; color: #66758a; font-weight: 700; }
        @media (max-width: 980px) {
            .booking-shell { grid-template-columns: 1fr; }
            .movie-card { position: static; display: grid; grid-template-columns: 120px 1fr; }
            .movie-poster { height: 180px; aspect-ratio: auto; }
            .movie-badge { display: none; }
        }
        @media (max-width: 640px) {
            .page { width: min(100% - 20px, 1180px); padding-top: 18px; }
            .schedule-head, .date-tabs, .showtime-panel { padding-left: 18px; padding-right: 18px; }
            .date-tabs { grid-auto-columns: 104px; }
            .movie-card { grid-template-columns: 96px 1fr; border-radius: 18px; }
            .movie-poster { height: 150px; }
            .movie-info { padding: 14px; }
        }
    </style>
</head>
<body>
<header th:replace="~{fragments/common_header :: flowHeader('Chọn suất chiếu')}"></header>

<main class="page">
    <div class="steps">
        <b class="active">1 Suất chiếu</b><b>2 Ghế</b><b>3 Đồ ăn</b><b>4 Xác nhận</b><b>5 Thanh toán</b>
    </div>

    <div class="booking-shell">
        <aside class="movie-card">
            <div class="poster-wrap">
                <img class="movie-poster" th:src="${movie.posterUrl}" th:alt="${movie.title}">
                <span class="movie-badge" th:if="${movie.ageRating != null}" th:text="${movie.ageRating}">T13</span>
            </div>
            <div class="movie-info">
                <h2 th:text="${movie.title}">Tên phim</h2>
                <div class="movie-meta">
                    <span th:if="${movie.format != null}">Định dạng: <b th:text="${movie.format}">Format</b></span>
                    <span th:if="${movie.duration != null}">Thời lượng: <b th:text="${movie.duration} + ' phút'">120 phút</b></span>
                    <span th:if="${movie.genre != null}">Thể loại: <b th:text="${movie.genre}">Genre</b></span>
                </div>
            </div>
        </aside>

        <section class="schedule-card">
            <div class="schedule-head">
                <div class="title-row">
                    <div>
                        <p class="eyebrow">Lịch chiếu</p>
                        <h1 th:text="${movie.title}">Tên phim</h1>
                        <p class="cinema-name" th:text="${cinemaName}">Cinema</p>
                    </div>
                    <a class="back-link" th:href="@{/movies/{id}(id=${movie.id})}" aria-label="Đóng">×</a>
                </div>
            </div>

            <!-- Mỗi tab ngày và panel lịch dùng cùng data-date để JavaScript đồng bộ trạng thái active. -->
            <div class="date-tabs" th:if="${!#lists.isEmpty(schedule)}">
                <button type="button"
                        class="date-tab"
                        th:each="day : ${schedule}"
                        th:classappend="${day.date.equals(selectedDate)} ? ' active'"
                        th:data-date="${day.date}">
                    <span class="day" th:text="${#temporals.format(day.date, 'dd')}">27</span>
                    <span class="month-week" th:text="'Tháng ' + ${#temporals.format(day.date, 'MM')} + ' • ' + ${day.dayOfWeekLabel}">Tháng 06 • T7</span>
                    <span class="hint" th:text="${#lists.size(day.showtimes)} + ' suất chiếu'">3 suất chiếu</span>
                </button>
            </div>

            <div class="alert" th:if="${error != null}" th:text="${error}">Có lỗi xảy ra.</div>

            <div th:if="${!#lists.isEmpty(schedule)}">
                <div class="showtime-panel"
                     th:each="day : ${schedule}"
                     th:classappend="${day.date.equals(selectedDate)} ? ' active'"
                     th:data-date="${day.date}">
                    <div class="format-row">
                        <h3 class="format-heading" th:text="${#lists.isEmpty(day.showtimes) ? 'Suất chiếu' : day.showtimes[0].format}">Suất chiếu</h3>
                        <span class="format-note">Chọn giờ để sang sơ đồ ghế</span>
                    </div>

                    <div class="time-grid">
                        <form th:each="showtime : ${day.showtimes}"
                              method="post"
                              th:action="@{/booking/showtimes/select}">
                            <input type="hidden" name="showtimeId" th:value="${showtime.id}">
                            <input type="hidden" name="movieId" th:value="${movie.id}">
                            <input type="hidden" name="date" th:value="${day.date}">
                            <button class="time-card"
                                    th:classappend="${showtime.startTime.hour >= 22} ? ' late'"
                                    type="submit"
                                    th:title="${showtime.format} + ' • ' + ${showtime.roomName}">
                                <span class="time-main" th:text="${#temporals.format(showtime.startTime, 'HH:mm')}">09:00</span>
                                <span class="time-room" th:text="${showtime.roomName}">Phòng 1</span>
                                <span class="time-meta">
                                    <span class="seat-pill" th:text="${showtime.availableSeatCount} + ' ghế trống'">146 ghế trống</span>
                                    <span class="late-pill" th:if="${showtime.startTime.hour >= 22}">Suất muộn</span>
                                </span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="empty" th:if="${#lists.isEmpty(schedule)}">
                Phim này hiện chưa có lịch chiếu khả dụng trong 30 ngày tới.
            </div>
        </section>
    </div>
</main>

<script>
    // Đổi ngày hoàn toàn phía client và cập nhật URL để reload/chia sẻ vẫn giữ đúng ngày đang xem.
    document.querySelectorAll('.date-tab').forEach((tab) => {
        tab.addEventListener('click', () => {
            const date = tab.dataset.date;
            document.querySelectorAll('.date-tab').forEach((item) => item.classList.toggle('active', item === tab));
            document.querySelectorAll('.showtime-panel').forEach((panel) => {
                panel.classList.toggle('active', panel.dataset.date === date);
            });
            const url = new URL(window.location.href);
            url.searchParams.set('date', date);
            window.history.replaceState({}, '', url);
        });
    });
</script>
</body>
</html>
