<!DOCTYPE html>

<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    

    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
</head>
<body class="admin-page">
<div class="admin-layout">
    <aside th:replace="~{fragments/admin_sidebar :: adminSidebar('posts')}"></aside>
    <main class="admin-main">

<div class="container py-4">

    
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Chi tiết bài viết</h2>

        <div>
            <a th:href="@{/admin/posts}"
               class="btn btn-secondary">
                Quay lại
            </a>

            <a th:href="@{/admin/posts/edit/{id}(id=${post.id})}"
               class="btn btn-warning">
                Chỉnh sửa
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Tiêu đề -->
            <h1 class="mb-3 fw-bold"
                th:text="${post.title}">
                Tiêu đề bài viết
            </h1>

            <!-- Thông tin cơ bản -->
            <div class="row mb-4">

                <div class="col-md-4">
                    <strong>Tác giả:</strong>
                    <span th:text="${post.author}"></span>
                </div>

                <div class="col-md-4">
                    <strong>Danh mục:</strong>
                    <span th:text="${post.category}"></span>
                </div>

                <div class="col-md-4">
                    <strong>Trạng thái:</strong>

                    <span class="badge bg-success"
                          th:if="${post.status == 'PUBLISHED'}">
                    Published
                </span>

                    <span class="badge bg-warning text-dark"
                          th:if="${post.status == 'DRAFT'}">
                    Draft
                </span>

                    <span class="badge bg-info"
                          th:if="${post.status == 'SCHEDULED'}">
                    Scheduled
                </span>
                </div>

            </div>

            <!-- Thumbnail -->
            <div class="text-center mb-4"
                 th:if="${post.thumbnail != null and !#strings.isEmpty(post.thumbnail)}">

                <img th:src="${post.thumbnail}"
                     alt="Thumbnail"
                     class="img-fluid rounded shadow"
                     style="max-height: 450px;">
            </div>

            <!-- Tóm tắt -->
            <div class="mb-4">
                <h5>Tóm tắt</h5>

                <div class="alert alert-light border">
                    <p class="mb-0"
                       th:text="${post.summary}">
                    </p>
                </div>
            </div>

            <!-- Nội dung -->
            <div class="mb-4">
                <h5>Nội dung bài viết</h5>

                <div class="border rounded p-4 bg-white"
                     th:utext="${post.content}">
                </div>
            </div>

            <!-- Tags -->
            <div class="mb-4">
                <h5>Tags</h5>

                <span class="badge bg-primary me-1"
                      th:text="${post.tags}">
            </span>
            </div>

            <hr>

            <!-- Thời gian -->
            <div class="row text-muted">

                <div class="col-md-4">
                    <strong>Ngày tạo:</strong><br>
                    <span th:text="${post.createdAt}"></span>
                </div>

                <div class="col-md-4">
                    <strong>Cập nhật lần cuối:</strong><br>
                    <span th:text="${post.updatedAt}"></span>
                </div>

                <div class="col-md-4"
                     th:if="${post.publishedAt != null}">
                    <strong>Ngày xuất bản:</strong><br>
                    <span th:text="${post.publishedAt}"></span>
                </div>

            </div>

        </div>
    </div>
    

</div>

    </main>
</div>
</body>
</html>
