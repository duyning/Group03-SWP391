<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản Quản lý | Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <style>
        /* ===== White & Blue theme overrides for Create Manager page ===== */

        /* Background: light gradient instead of dark */
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 40%, #dbeafe 100%) !important;
        }
        .admin-main.create-manager-main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 32px;
        }
        .admin-main.create-manager-main .register-wrapper {
            max-width: 620px;
        }

        /* Background decoration shapes → blue tones */
        .bg-shape-1 {
            background: radial-gradient(circle, #60a5fa, #2563eb) !important;
        }
        .bg-shape-2 {
            background: radial-gradient(circle, #93c5fd, #3b82f6) !important;
        }
        .bg-shape-3 {
            background: radial-gradient(circle, #38bdf8, #0284c7) !important;
        }

        /* Card: white solid background */
        .register-card {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(37, 99, 235, 0.12) !important;
            box-shadow: 0 25px 50px rgba(37, 99, 235, 0.12),
                        0 0 0 1px rgba(255, 255, 255, 0.8) inset !important;
        }

        /* Header: blue tones */
        .logo-icon {
            background: linear-gradient(135deg, #2563eb, #3b82f6) !important;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35) !important;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35); }
            50% { box-shadow: 0 8px 40px rgba(37, 99, 235, 0.55); }
        }
        .register-header h1 {
            color: #1e293b !important;
        }
        .register-header p {
            color: #64748b !important;
        }

        /* Input wrappers: white bg with subtle blue borders */
        .input-icon-wrapper {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1.5px solid #cbd5e1 !important;
        }
        .input-icon-wrapper:hover {
            border-color: #93c5fd !important;
            background: #ffffff !important;
        }
        .input-icon-wrapper.focused {
            border-color: #2563eb !important;
            background: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12) !important;
        }

        /* Input text: dark on white */
        .input-icon {
            color: #94a3b8 !important;
        }
        .input-icon-wrapper.focused .input-icon {
            color: #2563eb !important;
        }
        .form-input {
            color: #1e293b !important;
        }
        .form-input::placeholder {
            color: #94a3b8 !important;
        }
        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover,
        .form-input:-webkit-autofill:focus {
            -webkit-text-fill-color: #1e293b !important;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset !important;
        }

        /* Labels & required asterisk */
        .input-icon-wrapper label {
            color: #94a3b8 !important;
        }
        .required {
            color: #ef4444 !important;
        }

        /* Select dropdown */
        .select-input option {
            background: #ffffff !important;
            color: #1e293b !important;
        }

        /* Validation errors */
        .error-message {
            color: #ef4444 !important;
        }

        /* Toggle password */
        .toggle-password {
            color: #94a3b8 !important;
        }
        .toggle-password:hover {
            color: #2563eb !important;
        }

        /* Submit button: blue gradient */
        .btn-register {
            background: linear-gradient(135deg, #2563eb, #3b82f6) !important;
        }
        .btn-register:hover {
            box-shadow: 0 12px 35px rgba(37, 99, 235, 0.35) !important;
        }

        /* Footer link */
        .login-link {
            color: #2563eb !important;
        }
        .login-link::after {
            background: linear-gradient(90deg, #2563eb, #3b82f6) !important;
        }
        .login-link:hover {
            color: #1d4ed8 !important;
        }

        /* Footer border */
        .register-footer {
            border-top: 1px solid #e2e8f0 !important;
        }

        /* Success alert */
        .alert-success {
            background: rgba(34, 197, 94, 0.08) !important;
            border: 1px solid rgba(34, 197, 94, 0.3) !important;
            color: #16a34a !important;
        }
        .alert-success .btn-close {
            filter: none !important;
        }

        /* Scrollbar for light theme */
        ::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.2) !important;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 99, 235, 0.35) !important;
        }

        /* ===== jQuery UI Datepicker: white + blue ===== */
        .ui-datepicker {
            z-index: 9999 !important;
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            padding: 10px !important;
            color: #1e293b !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12) !important;
        }
        .ui-datepicker .ui-datepicker-header {
            background: transparent !important;
            border: none !important;
            color: #1e293b !important;
        }
        .ui-datepicker .ui-datepicker-title select {
            background: #f8fafc;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 2px 5px;
            margin: 0 2px;
        }
        .ui-datepicker th { color: #2563eb !important; }
        .ui-datepicker td span, .ui-datepicker td a {
            background: transparent !important;
            border: 1px solid transparent !important;
            color: #334155 !important;
            text-align: center !important;
            border-radius: 6px !important;
        }
        .ui-datepicker td a:hover {
            background: rgba(37, 99, 235, 0.1) !important;
            border: 1px solid #93c5fd !important;
        }
        .ui-datepicker-current-day a {
            background: linear-gradient(135deg, #2563eb, #3b82f6) !important;
            color: #fff !important;
            font-weight: bold !important;
        }
        .ui-datepicker .ui-datepicker-prev,
        .ui-datepicker .ui-datepicker-next {
            cursor: pointer;
        }
        .ui-datepicker .ui-datepicker-prev span,
        .ui-datepicker .ui-datepicker-next span {
            color: #2563eb !important;
        }
    </style>
</head>
<body class="admin-page">

<div class="admin-layout">
    <aside th:replace="~{fragments/admin_sidebar :: adminSidebar('create-manager')}"></aside>
    <main class="admin-main create-manager-main">
<header th:replace="~{fragments/admin_sidebar :: adminTopbar}"></header>
<div class="register-wrapper">
    <!-- Decorative background elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="register-card">
        <!-- Header -->
        <div class="register-header">
            <div class="logo-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1>Tạo tài khoản Quản lý</h1>
            <p>Dành riêng cho Admin</p>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/admin/create-manager}" th:object="${account}" method="POST" class="register-form" novalidate>

            <!-- Name -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" th:field="*{name}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           placeholder="Họ và tên"
                           id="name" required>
                    <label for="name">Họ và tên <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('name')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{name}"></span>
                </div>
            </div>

            <!-- Email -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" th:field="*{email}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                           placeholder="Thư điện tử"
                           id="email" required>
                    <label for="email">Thư điện tử <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('email')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{email}"></span>
                </div>
            </div>

            <!-- Password -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" th:field="*{password}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                           placeholder="Mật khẩu"
                           id="password" required>
                    <label for="password">Mật khẩu <span class="required">*</span></label>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{password}"></span>
                </div>
            </div>

            <!-- Phone Number -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" th:field="*{phoneNum}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('phoneNum')} ? 'is-invalid' : ''"
                           placeholder="Số điện thoại"
                           id="phoneNum" required>
                    <label for="phoneNum">Số điện thoại <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('phoneNum')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{phoneNum}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-floating-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-calendar input-icon"></i>
                        <input type="hidden" name="dob" th:value="*{dob}" id="dobHidden">
                        <input type="text"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('dob')} ? 'is-invalid' : ''"
                               placeholder="dd/MM/yyyy"
                               id="dobDisplay" required>
                        <label for="dobDisplay">Ngày sinh <span class="required">*</span></label>
                    </div>
                    <div th:if="${#fields.hasErrors('dob')}" class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:errors="*{dob}"></span>
                    </div>
                </div>

                <div class="form-floating-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-venus-mars input-icon"></i>
                        <select th:field="*{gender}" class="form-input select-input" id="gender">
                            <option value="" disabled selected>Chọn giới tính</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <label for="gender">Giới tính</label>
                    </div>
                </div>
            </div>

            <!-- Address -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper textarea-wrapper">
                    <i class="fas fa-map-marker-alt input-icon"></i>
                    <textarea th:field="*{address}"
                              class="form-input textarea-input"
                              placeholder="Địa chỉ"
                              id="address" rows="2"></textarea>
                    <label for="address">Địa chỉ</label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-register" id="btnRegister">
                <span class="btn-text">Tạo tài khoản</span>
                <span class="btn-loader" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
                <i class="fas fa-plus btn-arrow"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="register-footer">
            <p><a th:href="@{/admin/dashboard}" class="login-link"><i class="fas fa-arrow-left"></i> Quay lại Dashboard</a></p>
        </div>
    </div>
</div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        $.datepicker.regional['vi'] = {
            closeText: 'Đóng',
            prevText: 'Trước',
            nextText: 'Tiếp',
            currentText: 'Hôm nay',
            monthNames: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
            'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'],
            monthNamesShort: ['Thg 1', 'Thg 2', 'Thg 3', 'Thg 4', 'Thg 5', 'Thg 6',
            'Thg 7', 'Thg 8', 'Thg 9', 'Thg 10', 'Thg 11', 'Thg 12'],
            dayNames: ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'],
            dayNamesShort: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            dayNamesMin: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            weekHeader: 'Tu',
            dateFormat: 'dd/mm/yy',
            firstDay: 1,
            isRTL: false,
            showMonthAfterYear: false,
            yearSuffix: ''};
        $.datepicker.setDefaults($.datepicker.regional['vi']);

        $("#dobDisplay").datepicker({
            changeMonth: true,
            changeYear: true,
            yearRange: "-100:-18",
            defaultDate: "-20y",
            altField: "#dobHidden",
            altFormat: "yy-mm-dd",
            maxDate: "-18y",
            minDate: "-100y"
        });

        // Preserve date format in UI if backend validation fails and reloads the page
        const hiddenVal = $("#dobHidden").val();
        if (hiddenVal) {
            const parts = hiddenVal.split('-');
            if (parts.length === 3) {
                const formatted = parts[2] + '/' + parts[1] + '/' + parts[0];
                $("#dobDisplay").val(formatted);
            }
        }
    });

    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // Form submit animation
    document.querySelector('.register-form').addEventListener('submit', function () {
        const btn = document.getElementById('btnRegister');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.btn-arrow').style.display = 'none';
        btn.querySelector('.btn-loader').style.display = 'inline-block';
    });

    // Input focus animation
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('focus', function () {
            this.closest('.input-icon-wrapper').classList.add('focused');
        });
        input.addEventListener('blur', function () {
            this.closest('.input-icon-wrapper').classList.remove('focused');
        });
    });
</script>

</body>
</html>
