<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật ký hoạt động - CineFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common-header.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --page-bg: #f4f8ff;
            --surface: #ffffff;
            --surface-soft: #f8fbff;
            --line: #dbeafe;
            --line-strong: #bfdbfe;
            --text-main: #0f2747;
            --text-body: #334155;
            --text-muted: #64748b;
            --brand-blue: #0054a6;
            --brand-blue-dark: #003f7d;
            --brand-blue-soft: #eaf3ff;
            --success: #0f9f6e;
            --warning: #d97706;
            --danger: #dc2626;
            --cyan: #0284c7;
            --shadow-card: 0 18px 45px rgba(15, 35, 75, 0.10);
            --shadow-hover: 0 22px 60px rgba(0, 84, 166, 0.16);
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(0, 84, 166, 0.12), transparent 34%),
                linear-gradient(180deg, #ffffff 0%, var(--page-bg) 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            padding: 42px 20px;
        }

        .page-container {
            max-width: 920px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 26px;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 22px 24px;
            box-shadow: var(--shadow-card);
        }

        .page-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--brand-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--brand-blue-soft);
            color: var(--brand-blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(0, 84, 166, 0.12);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--brand-blue);
            border: 1px solid var(--brand-blue);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.25s;
            box-shadow: 0 10px 24px rgba(0, 84, 166, 0.20);
        }

        .btn-back:hover {
            background: var(--brand-blue-dark);
            border-color: var(--brand-blue-dark);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* ── Timeline ── */
        .timeline {
            position: relative;
            padding-left: 54px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: linear-gradient(to bottom, var(--brand-blue), rgba(0, 84, 166, 0.05));
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            animation: slideIn 0.4s ease-out both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* Stagger animation for each item */
        .timeline-item:nth-child(1)  { animation-delay: 0.05s; }
        .timeline-item:nth-child(2)  { animation-delay: 0.10s; }
        .timeline-item:nth-child(3)  { animation-delay: 0.15s; }
        .timeline-item:nth-child(4)  { animation-delay: 0.20s; }
        .timeline-item:nth-child(5)  { animation-delay: 0.25s; }
        .timeline-item:nth-child(6)  { animation-delay: 0.30s; }
        .timeline-item:nth-child(7)  { animation-delay: 0.35s; }
        .timeline-item:nth-child(8)  { animation-delay: 0.40s; }
        .timeline-item:nth-child(9)  { animation-delay: 0.45s; }
        .timeline-item:nth-child(10) { animation-delay: 0.50s; }

        .timeline-dot {
            position: absolute;
            left: -42px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            border: 2px solid transparent;
            flex-shrink: 0;
        }

        .timeline-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            box-shadow: 0 12px 30px rgba(15, 35, 75, 0.07);
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
        }

        .timeline-card:hover {
            border-color: var(--line-strong);
            box-shadow: var(--shadow-hover);
            transform: translateX(4px);
        }

        .log-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .log-icon--login    { background: #ecfdf5; color: var(--success); border: 1px solid #bbf7d0; }
        .log-icon--logout   { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
        .log-icon--profile  { background: var(--brand-blue-soft); color: var(--brand-blue); border: 1px solid var(--line-strong); }
        .log-icon--password { background: #fffbeb; color: var(--warning); border: 1px solid #fde68a; }
        .log-icon--ticket   { background: #fffbeb; color: var(--warning); border: 1px solid #fde68a; }
        .log-icon--payment  { background: #ecfeff; color: var(--cyan); border: 1px solid #bae6fd; }
        .log-icon--voucher  { background: #eff6ff; color: var(--brand-blue); border: 1px solid var(--line-strong); }
        .log-icon--movie    { background: #eff6ff; color: var(--brand-blue); border: 1px solid var(--line-strong); }
        .log-icon--post     { background: #eff6ff; color: var(--brand-blue); border: 1px solid var(--line-strong); }
        .log-icon--account  { background: #ecfeff; color: var(--cyan); border: 1px solid #bae6fd; }
        .log-icon--showtime { background: #ecfdf5; color: var(--success); border: 1px solid #bbf7d0; }
        .log-icon--other    { background: #f8fafc; color: var(--text-muted); border: 1px solid #e2e8f0; }

        /* Dot uses same colour as badge */
        .timeline-dot.log-icon--login    { background: #ecfdf5; border-color: var(--success); color: var(--success); }
        .timeline-dot.log-icon--logout   { background: #fef2f2; border-color: var(--danger); color: var(--danger); }
        .timeline-dot.log-icon--profile  { background: var(--brand-blue-soft); border-color: var(--brand-blue); color: var(--brand-blue); }
        .timeline-dot.log-icon--password { background: #fffbeb; border-color: var(--warning); color: var(--warning); }
        .timeline-dot.log-icon--ticket   { background: #fffbeb; border-color: var(--warning); color: var(--warning); }
        .timeline-dot.log-icon--payment  { background: #ecfeff; border-color: var(--cyan); color: var(--cyan); }
        .timeline-dot.log-icon--voucher  { background: #eff6ff; border-color: var(--brand-blue); color: var(--brand-blue); }
        .timeline-dot.log-icon--movie    { background: #eff6ff; border-color: var(--brand-blue); color: var(--brand-blue); }
        .timeline-dot.log-icon--post     { background: #eff6ff; border-color: var(--brand-blue); color: var(--brand-blue); }
        .timeline-dot.log-icon--account  { background: #ecfeff; border-color: var(--cyan); color: var(--cyan); }
        .timeline-dot.log-icon--showtime { background: #ecfdf5; border-color: var(--success); color: var(--success); }
        .timeline-dot.log-icon--other    { background: #f8fafc; border-color: #cbd5e1; color: var(--text-muted); }

        .log-info { flex: 1; min-width: 0; }

        .log-action-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .log-description {
            font-size: 0.83rem;
            color: var(--text-body);
            word-break: break-word;
        }

        .log-time {
            font-size: 0.75rem;
            color: var(--brand-blue);
            white-space: nowrap;
            text-align: right;
            flex-shrink: 0;
            font-weight: 700;
        }

        .log-ip {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--surface);
            border: 1px dashed var(--line-strong);
            border-radius: 20px;
            box-shadow: var(--shadow-card);
        }

        .empty-state i {
            font-size: 3.5rem;
            color: #bfdbfe;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            color: var(--brand-blue);
        }

        /* ── Responsive ── */
        @media (max-width: 576px) {
            .timeline { padding-left: 44px; }
            .timeline-dot { left: -36px; width: 30px; height: 30px; font-size: 0.75rem; }
            .timeline::before { left: 15px; }
            .log-time { display: none; }
        }
    </style>
</head>
<body class="customer-header-page">

<div th:replace="~{fragments/common_header :: customerHeader('', '')}"></div>

<div class="page-container">
    <!-- Header -->
    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-history"></i>
            Nhật ký hoạt động
        </div>
        <a th:href="@{/profile}" class="btn-back">
            <i class="fas fa-arrow-left"></i> Hồ sơ của tôi
        </a>
    </div>

    <!-- Timeline -->
    <div class="timeline" th:if="${!logs.isEmpty()}">
        <div class="timeline-item" th:each="log : ${logs}">
            <!-- Dot on the line -->
            <div class="timeline-dot fas" th:classappend="${log.actionIconClass}"></div>

            <!-- Card -->
            <div class="timeline-card">
                <!-- Left: badge + info -->
                <div class="log-info">
                    <div class="log-action-name">
                        <span class="log-badge" th:classappend="${log.actionIconClass}">
                            <i class="fas" th:classappend="${log.actionIconClass.split(' ')[0]}"></i>
                            <span th:text="${log.actionDisplayName}">Hành động</span>
                        </span>
                    </div>
                    <div class="log-description" th:text="${log.description}" th:if="${log.description != null and !log.description.isEmpty()}">
                        Mô tả hành động
                    </div>
                    <div class="log-ip" th:if="${log.ipAddress != null and !log.ipAddress.isEmpty()}">
                        <i class="fas fa-network-wired"></i>
                        <span th:text="${log.ipAddress}">127.0.0.1</span>
                    </div>
                </div>

                <!-- Right: time -->
                <div class="log-time">
                    <div th:text="${#temporals.format(log.createdAt, 'HH:mm')}">14:30</div>
                    <div style="color: #64748b; margin-top: 2px;"
                         th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy')}">01/07/2026</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${logs.isEmpty()}">
        <i class="fas fa-clipboard-list"></i>
        <h3>Chưa có hoạt động nào được ghi lại</h3>
        <p style="font-size: 0.85rem; color: #64748b; margin-top: 8px;">
            Các hoạt động của bạn sẽ xuất hiện ở đây sau khi bạn thực hiện chúng.
        </p>
    </div>
</div>

</body>
</html>
