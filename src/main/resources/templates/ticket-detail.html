<!--
  Trang "Chi tiết vé" (Ticket Detail).
  Hiển thị đầy đủ thông tin một vé xem phim đã đặt.

  Ngày thực hiện: 26/06/2026
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Chi tiết vé - ' + ${ticket.movie.title}">Chi tiết vé - CinemaBook</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .ticket-detail-container {
            width: min(100%, 700px);
            max-width: 700px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ticket visual design - cinema ticket style */
        .ticket-visual {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            position: relative;
        }

        /* Top section: Movie info */
        .ticket-top {
            padding: 32px;
            display: flex;
            gap: 24px;
            position: relative;
        }

        .ticket-top::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: repeating-linear-gradient(
                to right,
                rgba(255,255,255,0.1) 0,
                rgba(255,255,255,0.1) 8px,
                transparent 8px,
                transparent 16px
            );
        }

        .movie-poster {
            width: 120px;
            height: 175px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .movie-poster-placeholder {
            width: 120px;
            height: 175px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(236,72,153,0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .movie-poster-placeholder i {
            font-size: 2.5rem;
            color: rgba(255,255,255,0.2);
        }

        .movie-info {
            flex: 1;
            min-width: 0;
        }

        .movie-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.3;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .movie-genre {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }

        .movie-duration {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
        }

        .detail-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .status-used {
            background: rgba(148,163,184,0.15);
            color: #94a3b8;
            border: 1px solid rgba(148,163,184,0.3);
        }

        .status-cancelled {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* Middle section: Showtime details */
        .ticket-middle {
            padding: 28px 32px;
            position: relative;
        }

        .ticket-middle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: repeating-linear-gradient(
                to right,
                rgba(255,255,255,0.1) 0,
                rgba(255,255,255,0.1) 8px,
                transparent 8px,
                transparent 16px
            );
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .detail-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(167,139,250,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #c4b5fd;
            flex-shrink: 0;
        }

        .detail-content {
            flex: 1;
            min-width: 0;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e0e0f0;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .detail-item-full {
            grid-column: 1 / -1;
        }

        /* Bottom section: Booking code + price */
        .ticket-bottom {
            padding: 28px 32px;
        }

        .booking-code-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .booking-code-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 10px;
        }

        .booking-code-value {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 12px 24px;
            border: 2px dashed rgba(167,139,250,0.3);
            border-radius: 14px;
            display: inline-block;
        }

        .booking-code-hint {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            margin-top: 8px;
        }

        .price-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
        }

        .price-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fbbf24;
        }

        /* Actions */
        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-action {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            overflow-wrap: anywhere;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
        }

        .btn-back {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, #a78bfa, #ec4899);
            color: white;
        }

        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167,139,250,0.35);
            color: white;
        }

        @media (max-width: 576px) {
            .ticket-top {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .movie-poster,
            .movie-poster-placeholder {
                width: 160px;
                height: 230px;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }

            .booking-code-value {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .price-section {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

            .ticket-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="ticket-detail-container">
    <div class="ticket-visual">
        <!-- Top: Movie info -->
        <div class="ticket-top">
            <img th:if="${ticket.movie.posterUrl != null && !ticket.movie.posterUrl.isEmpty()}"
                 th:src="${ticket.movie.posterUrl}"
                 th:alt="${ticket.movie.title}"
                 class="movie-poster">
            <div th:if="${ticket.movie.posterUrl == null || ticket.movie.posterUrl.isEmpty()}"
                 class="movie-poster-placeholder">
                <i class="fas fa-film"></i>
            </div>

            <div class="movie-info">
                <div class="movie-title" th:text="${ticket.movie.title}">Tên phim</div>
                <div class="movie-genre" th:if="${ticket.movie.genre != null}">
                    <i class="fas fa-tags"></i>
                    <span th:text="${ticket.movie.genre}">Hành động</span>
                </div>
                <div class="movie-duration" th:if="${ticket.movie.duration != null}">
                    <i class="fas fa-hourglass-half"></i>
                    <span th:text="${ticket.movie.duration + ' phút'}">120 phút</span>
                </div>
                <span class="detail-status-badge"
                      th:classappend="${ticket.status == 'CONFIRMED'} ? 'status-confirmed' : (${ticket.status == 'USED'} ? 'status-used' : 'status-cancelled')">
                    <i th:classappend="${ticket.status == 'CONFIRMED'} ? 'fa-check-circle' : (${ticket.status == 'USED'} ? 'fa-check-double' : 'fa-times-circle')"
                       class="fas"></i>
                    <span th:text="${ticket.statusDisplayName}">Đã xác nhận</span>
                </span>
            </div>
        </div>

        <!-- Middle: Showtime details -->
        <div class="ticket-middle">
            <div class="detail-grid">
                <!-- Ngày chiếu -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-calendar-alt"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Ngày chiếu</div>
                        <div class="detail-value" th:text="${#temporals.format(ticket.showDate, 'EEEE, dd/MM/yyyy')}">Thứ Hai, 01/01/2026</div>
                    </div>
                </div>

                <!-- Giờ chiếu -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-clock"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Giờ chiếu</div>
                        <div class="detail-value" th:text="${#temporals.format(ticket.showTime, 'HH:mm')}">19:30</div>
                    </div>
                </div>

                <!-- Phòng chiếu -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-door-open"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Phòng chiếu</div>
                        <div class="detail-value" th:text="${ticket.roomName}">Phòng 01</div>
                    </div>
                </div>

                <!-- Ghế -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-chair"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Ghế</div>
                        <div class="detail-value" th:text="${ticket.seatLabel + ' (' + ticket.seatTypeDisplayName + ')'}">A5 (Thường)</div>
                    </div>
                </div>

                <!-- Phương thức thanh toán -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-credit-card"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Thanh toán</div>
                        <div class="detail-value" th:text="${ticket.paymentMethod != null ? ticket.paymentMethod : 'Chưa xác định'}">Momo</div>
                    </div>
                </div>

                <!-- Thời gian đặt -->
                <div class="detail-item">
                    <div class="detail-icon"><i class="fas fa-history"></i></div>
                    <div class="detail-content">
                        <div class="detail-label">Thời gian đặt</div>
                        <div class="detail-value" th:text="${#temporals.format(ticket.bookingTime, 'HH:mm - dd/MM/yyyy')}">15:30 - 25/06/2026</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom: Booking code + Price -->
        <div class="ticket-bottom">
            <div class="booking-code-section">
                <div class="booking-code-label">Mã đặt vé</div>
                <div class="booking-code-value" th:text="${ticket.bookingCode}">CF-20260625-001</div>
                <div class="booking-code-hint">Vui lòng xuất trình mã này tại quầy vé</div>
            </div>

            <div class="price-section">
                <div class="price-label">Tổng thanh toán</div>
                <div class="price-value" th:text="${#numbers.formatDecimal(ticket.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">85,000 ₫</div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="ticket-actions">
        <a th:href="@{/my-tickets}" class="btn-action btn-back">
            <i class="fas fa-arrow-left"></i> Quay lại danh sách vé
        </a>
        <a th:href="@{/home}" class="btn-action btn-primary-gradient">
            <i class="fas fa-home"></i> Trang chủ
        </a>
    </div>
</div>

</body>
</html>
