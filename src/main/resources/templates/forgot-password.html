<!--
  Trang Quên mật khẩu (Forgot Password).
  Giao diện 3 bước xác thực email, nhập mã OTP và đặt lại mật khẩu mới.
  
  Ngày thực hiện: 04/06/2026
  Tạo bởi: DuongND_HE186619
-->
<!DOCTYPE html>
<!--
  Updated on 2026-06-04: Translated visible frontend title and email wording to Vietnamese.
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu | Beta Cinemas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/customer-account.css}">
    <style>
        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
            margin-bottom: 1rem;
        }
        .back-link:hover {
            color: #a78bfa;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .step-dot.active {
            background: #a78bfa;
            box-shadow: 0 0 8px rgba(167,139,250,0.6);
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="register-card">
        
        <a th:href="@{/login}" class="back-link"><i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập</a>

        <!-- Header -->
        <div class="register-header">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Khôi phục mật khẩu</h1>
            
            <p th:if="${step == 1}">Nhập thư điện tử đã đăng ký để nhận mã xác nhận</p>
            <p th:if="${step == 2}">Vui lòng kiểm tra thư điện tử và nhập mã gồm 6 chữ số</p>
            <p th:if="${step == 3}">Tạo mật khẩu mới cho tài khoản của bạn</p>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step-dot" th:classappend="${step >= 1 ? 'active' : ''}"></div>
            <div class="step-dot" th:classappend="${step >= 2 ? 'active' : ''}"></div>
            <div class="step-dot" th:classappend="${step == 3 ? 'active' : ''}"></div>
        </div>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show animate-slide-in" role="alert"
             data-auto-dismiss="5000"
             style="background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: #86efac; border-radius: 14px; font-size: 0.9rem; backdrop-filter: blur(10px);">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1); opacity: 0.5;"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show animate-slide-in" role="alert"
             data-auto-dismiss="5000"
             style="background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; border-radius: 14px; font-size: 0.9rem; backdrop-filter: blur(10px);">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter: invert(1); opacity: 0.5;"></button>
        </div>

        <!-- STEP 1: EMAIL -->
        <form th:if="${step == 1}" th:action="@{/forgot-password/send-otp}" method="POST" class="register-form" novalidate>
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-input" placeholder="Thư điện tử của bạn" id="email" required>
                    <label for="email">Thư điện tử <span class="required">*</span></label>
                </div>
            </div>
            <button type="submit" class="btn-register" style="margin-top: 1.5rem;">
                <span class="btn-text">Gửi mã xác nhận</span>
                <i class="fas fa-paper-plane btn-arrow"></i>
            </button>
        </form>

        <!-- STEP 2: OTP -->
        <form th:if="${step == 2}" th:action="@{/forgot-password/verify-otp}" method="POST" class="register-form" novalidate>
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-hashtag input-icon"></i>
                    <input type="text" name="otp" class="form-input" placeholder="Nhập mã OTP 6 số" id="otp" required maxlength="6" pattern="\d{6}">
                    <label for="otp">Mã xác nhận (OTP) <span class="required">*</span></label>
                </div>
            </div>
            <button type="submit" class="btn-register" style="margin-top: 1.5rem;">
                <span class="btn-text">Xác nhận</span>
                <i class="fas fa-check btn-arrow"></i>
            </button>
        </form>

        <!-- STEP 3: NEW PASSWORD -->
        <form th:if="${step == 3}" th:action="@{/forgot-password/update-password}" method="POST" class="register-form" novalidate>
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="newPassword" class="form-input" placeholder="Mật khẩu mới (8-20 ký tự)" id="newPassword" required>
                    <label for="newPassword">Mật khẩu mới <span class="required">*</span></label>
                    <button type="button" class="toggle-password" onclick="toggleField('newPassword', 'iconNew')">
                        <i class="fas fa-eye" id="iconNew"></i>
                    </button>
                </div>
            </div>
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-check-double input-icon"></i>
                    <input type="password" name="confirmPassword" class="form-input" placeholder="Nhập lại mật khẩu mới" id="confirmPassword" required>
                    <label for="confirmPassword">Xác nhận mật khẩu <span class="required">*</span></label>
                    <button type="button" class="toggle-password" onclick="toggleField('confirmPassword', 'iconConfirm')">
                        <i class="fas fa-eye" id="iconConfirm"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-register" style="margin-top: 1.5rem;">
                <span class="btn-text">Lưu mật khẩu mới</span>
                <i class="fas fa-save btn-arrow"></i>
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auto-dismiss-alerts.js}"></script>
<script>
    // Toggle password visibility
    function toggleField(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // Input focus animation
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('focus', function () {
            this.closest('.input-icon-wrapper').classList.add('focused');
        });
        input.addEventListener('blur', function () {
            this.closest('.input-icon-wrapper').classList.remove('focused');
        });
    });
</script>
</body>
</html>
