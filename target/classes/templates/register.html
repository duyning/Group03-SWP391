<!--
  Trang Đăng ký tài khoản (Register Page).
  Giao diện đăng ký tài khoản khách hàng mới với các trường thông tin cơ bản.
  
  Ngày thực hiện: 04/06/2026
  Tạo bởi: DuongND_HE186619
-->
<!DOCTYPE html>
<!--
  Updated on 2026-06-04: Translated visible frontend title and email wording to Vietnamese.
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | CineFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/customer-account.css}">
    <style>
        .ui-datepicker {
            z-index: 9999 !important;
            background: #2a2a4a !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px !important;
            padding: 10px !important;
            color: #fff !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .ui-datepicker .ui-datepicker-header {
            background: transparent !important;
            border: none !important;
            color: #fff !important;
        }
        .ui-datepicker .ui-datepicker-title select {
            background: #1e1e38;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            padding: 2px 5px;
            margin: 0 2px;
        }
        .ui-datepicker th { color: #a78bfa !important; }
        .ui-datepicker td span, .ui-datepicker td a {
            background: transparent !important;
            border: 1px solid transparent !important;
            color: #e0e0e0 !important;
            text-align: center !important;
            border-radius: 6px !important;
        }
        .ui-datepicker td a:hover {
            background: rgba(167, 139, 250, 0.2) !important;
            border: 1px solid #a78bfa !important;
        }
        .ui-datepicker-current-day a {
            background: linear-gradient(135deg, #a78bfa, #ec4899) !important;
            color: #fff !important;
            font-weight: bold !important;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <!-- Decorative background elements -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="register-card">
        <!-- Header -->
        <div class="register-header">
            <div class="logo-icon">
                <i class="fas fa-film"></i>
            </div>
            <h1>Tạo tài khoản</h1>
            <p>Đăng ký để đặt vé xem phim nhanh chóng và tiện lợi</p>
        </div>

        <!-- Success message -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show animate-slide-in" role="alert" data-auto-dismiss="5000">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage != null ? successMessage : 'Đăng ký thành công! Vui lòng đăng nhập.'}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Registration Form -->
        <form th:action="@{/register}" th:object="${account}" method="POST" class="register-form" novalidate>

            <!-- Name -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" th:field="*{name}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           placeholder="Họ và tên"
                           id="name" required>
                    <label for="name">Họ và tên <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('name')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{name}"></span>
                </div>
            </div>

            <!-- Email -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" th:field="*{email}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                           placeholder="Thư điện tử"
                           id="email" required>
                    <label for="email">Thư điện tử <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('email')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{email}"></span>
                </div>
            </div>

            <!-- Password -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" th:field="*{password}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                           placeholder="Mật khẩu"
                           id="password" required>
                    <label for="password">Mật khẩu <span class="required">*</span></label>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{password}"></span>
                </div>
            </div>

            <!-- Phone Number -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" th:field="*{phoneNum}"
                           class="form-input"
                           th:classappend="${#fields.hasErrors('phoneNum')} ? 'is-invalid' : ''"
                           placeholder="Số điện thoại"
                           id="phoneNum" required>
                    <label for="phoneNum">Số điện thoại <span class="required">*</span></label>
                </div>
                <div th:if="${#fields.hasErrors('phoneNum')}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:errors="*{phoneNum}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-floating-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-calendar input-icon"></i>
                        <input type="hidden" name="dob" th:value="*{dob}" id="dobHidden">
                        <input type="text"
                               class="form-input"
                               th:classappend="${#fields.hasErrors('dob')} ? 'is-invalid' : ''"
                               placeholder="dd/MM/yyyy"
                               id="dobDisplay" required>
                        <label for="dobDisplay">Ngày sinh <span class="required">*</span></label>
                    </div>
                    <div th:if="${#fields.hasErrors('dob')}" class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <span th:errors="*{dob}"></span>
                    </div>
                </div>

                <div class="form-floating-group">
                    <div class="input-icon-wrapper">
                        <i class="fas fa-venus-mars input-icon"></i>
                        <select th:field="*{gender}" class="form-input select-input" id="gender">
                            <option value="" disabled selected>Chọn giới tính</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <label for="gender">Giới tính</label>
                    </div>
                </div>
            </div>

            <!-- Address -->
            <div class="form-floating-group">
                <div class="input-icon-wrapper textarea-wrapper">
                    <i class="fas fa-map-marker-alt input-icon"></i>
                    <textarea th:field="*{address}"
                              class="form-input textarea-input"
                              placeholder="Địa chỉ"
                              id="address" rows="2"></textarea>
                    <label for="address">Địa chỉ</label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-register" id="btnRegister">
                <span class="btn-text">Đăng ký</span>
                <span class="btn-loader" style="display: none;">
                    <i class="fas fa-spinner fa-spin"></i>
                </span>
                <i class="fas fa-arrow-right btn-arrow"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="register-footer">
            <p>Đã có tài khoản? <a th:href="@{/login}" class="login-link">Đăng nhập ngay</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auto-dismiss-alerts.js}"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        $.datepicker.regional['vi'] = {
            closeText: 'Đóng',
            prevText: 'Trước',
            nextText: 'Tiếp',
            currentText: 'Hôm nay',
            monthNames: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
            'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'],
            monthNamesShort: ['Thg 1', 'Thg 2', 'Thg 3', 'Thg 4', 'Thg 5', 'Thg 6',
            'Thg 7', 'Thg 8', 'Thg 9', 'Thg 10', 'Thg 11', 'Thg 12'],
            dayNames: ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'],
            dayNamesShort: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            dayNamesMin: ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'],
            weekHeader: 'Tu',
            dateFormat: 'dd/mm/yy',
            firstDay: 1,
            isRTL: false,
            showMonthAfterYear: false,
            yearSuffix: ''};
        $.datepicker.setDefaults($.datepicker.regional['vi']);

        $("#dobDisplay").datepicker({
            changeMonth: true,
            changeYear: true,
            yearRange: "-100:-13",
            defaultDate: "-20y",
            altField: "#dobHidden",
            altFormat: "yy-mm-dd",
            maxDate: "-13y",
            minDate: "-100y"
        });

        // Preserve date format in UI if backend validation fails and reloads the page
        const hiddenVal = $("#dobHidden").val();
        if (hiddenVal) {
            const parts = hiddenVal.split('-');
            if (parts.length === 3) {
                const formatted = parts[2] + '/' + parts[1] + '/' + parts[0];
                $("#dobDisplay").val(formatted);
            }
        }
    });

    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // Form submit animation
    document.querySelector('.register-form').addEventListener('submit', function () {
        const btn = document.getElementById('btnRegister');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.btn-arrow').style.display = 'none';
        btn.querySelector('.btn-loader').style.display = 'inline-block';
    });

    // Input focus animation
    document.querySelectorAll('.form-input').forEach(input => {
        input.addEventListener('focus', function () {
            this.closest('.input-icon-wrapper').classList.add('focused');
        });
        input.addEventListener('blur', function () {
            this.closest('.input-icon-wrapper').classList.remove('focused');
        });
    });
</script>

</body>
</html>
